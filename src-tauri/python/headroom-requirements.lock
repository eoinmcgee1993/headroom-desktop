# Reviewed known-good Headroom runtime lock.
# Source: headroom-ai[all,vector]==0.32.0 dependency resolution for cp312 /
# macOS 14 arm64 (min deployment target 14.0). Base pins captured on 2026-06-30,
# carried forward and topped up per bump (see lineage).
#
# Resolution lineage: 0.25.0 freeze -> carried to 0.26.0/0.27.0 -> regenerated
# for 0.28.0 (base of the current pin set) -> carried through 0.29.0-0.31.0
# point-version churn -> 0.32.0.
#   - 0.32.0: two new hard deps landed in 0.32.0's requires_dist for the
#     installed [all,vector] set: tomlkit (unconditional core) and orjson
#     (proxy extra, CPython-only via `platform_python_implementation != "PyPy"`).
#     Both are leaf packages (no transitive deps), so they are appended without
#     re-resolving. headroom-ai installs --no-deps against this lock, so a
#     missing pin here is a ModuleNotFoundError at proxy boot, not a resolver
#     warning. Every other 0.32.0 requirement was already satisfied by the
#     carried-forward pins (verified against 0.32.0 requires_dist); rapidocr and
#     tomli also appear in requires_dist but are gated out on cp312 by their
#     python_version markers (>=3.13 and <3.11 respectively).
#   The 0.28.0 requires_dist changed enough that the lock was re-
# resolved from scratch rather than hand-patched. Notable deltas vs 0.27.0:
#   - benchmark extra dropped from headroom-ai[all], removing the eval tooling
#     tail (lm-eval, evaluate, sacrebleu, rouge-score, nltk, pytablewriter,
#     tabulate, sqlitedict, word2number, and their transitive deps). The proxy
#     never imported these; bundle shrinks.
#   - hnswlib moved from the `memory` extra to a new `vector` extra that [all]
#     does NOT include. We resolve [all,vector] so hnswlib==0.8.0 stays present
#     (the proxy memory adapters import it).
#   - torch 2.11.0 -> 2.12.1 (ml/voice floor raised to >=2.12.1). 2.12.1 ships
#     only macosx_14_0_arm64 wheels; safe because the app's minimumSystemVersion
#     is 14.0, so every supported user gets a wheel.
#   - broad point-version churn (anthropic, openai, litellm, transformers,
#     onnxruntime, protobuf 6->7, etc.) from the fresh resolution.
