# Linux bootstrap runtime for Headroom desktop.
# This intentionally excludes optional memory/ML extras from headroom-ai[all]
# because packages such as hnswlib do not ship broadly compatible Linux wheels
# and cause bootstrap to fail on fresh machines.
#
# Versions kept in sync with headroom-requirements.lock where the package
# overlaps. 0.32.0 adds two new hard deps to headroom-ai's core/proxy
# requires_dist that this subset installs -- tomlkit (core) and orjson (proxy) --
# so both are added here too (leaf packages, no transitive deps). We do not
# currently ship Linux from release-macos.yml; when Linux is added, re-validate
# this lock against a real Linux minimal install before relying on it.
